<!doctype html>
<html lang="en">
  <head>
    <script>
      // Redefine window.fetch with a getter and a setter to prevent "Cannot set property fetch of #<Window> which has only a getter" errors in sandboxed environments
      (function() {
        try {
          var originalFetch = window.fetch;
          var customFetch = originalFetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return customFetch; },
            set: function(val) { customFetch = val; },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          try {
            var originalFetch = window.fetch;
            var customFetch = originalFetch;
            Object.defineProperty(Window.prototype, 'fetch', {
              get: function() { return customFetch; },
              set: function(val) { customFetch = val; },
              configurable: true,
              enumerable: true
            });
          } catch (err) {
            console.warn('Could not redefine window.fetch with setter:', err);
          }
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
